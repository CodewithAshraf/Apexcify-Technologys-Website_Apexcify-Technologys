<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | Apexcify Technologies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a192f;
            --sky-blue: #0077b6;
            --white: #ffffff;
            --gray: #f4f7f9;
            --border: #e0e6ed;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--gray);
            color: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        
       
        @media (max-width: 850px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
            .contact-info {
                padding: 40px;
                text-align: center;
            }
            .contact-info h1 { font-size: 2.2rem; }
            .contact-form-wrapper { padding: 40px; }
        }  
    </style>
</head>
<body>
 <header id="mainHeader">
    <div class="container">
      <nav>
        <a href="index.html" class="logo">Apexcify<span>Technology</span></a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="aboutus.html">About</a></li>
          <li><a href="index.html#services">Services</a></li>
          <li><a href="index.html#process">Process</a></li>
          <li><a href="#contact" class="btn btn-primary" style="color: white; padding: 8px 20px;">Contact Us</a></li>
        </ul>
      </nav>
    </div>
  </header>
    <div class="contact-container">
        <div class="contact-info">
            <h1>Got a Project?</h1>
            <p>Tell us about your vision. Our team of experts is ready to help you build, scale, and innovate.</p>
            
            <ul class="contact-details">
               
                <li><span>📧</span> hr.apexcifytechnologys@gmail.com</li>
                <li><span>🕒</span> Response within 24 hours</li>
            </ul>
        </div>

        <div class="contact-form-wrapper">
            <form id="projectForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" placeholder="john@company.com" required>
                </div>

           

                <div class="form-group">
                    <label for="message">Project Details</label>
                    <textarea id="message" placeholder="Briefly describe your project goals..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Proposal Request</button>
            </form>
        </div>
    </div>

</body>
</html>
